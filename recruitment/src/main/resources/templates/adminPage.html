<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>User Page</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body style="background-color: #1d254d; color: white">
    <div th:insert="header::header"></div>
    <h1 style="color: white">Handle applications</h1>
    <div>Applications</div>
    <div style="text-align: left">
        <!-- TODO - show all applications -->
         <div th:if="${!applications.isEmpty()}">
        <div th:each="app : ${applications}" style="border: 1px solid black; padding: 15px; margin: 10px 0; border-radius: 4px;">
          <p><strong>Status:</strong> <span th:text="${app.status}"></span></p>
          <p><strong>Submitted:</strong> <span th:text="${app.createdAt}"></span></p>
        </div>
      </div>
      <div th:if="${applications.isEmpty()}">
        <p>No applications yet.</p>
      </div>
      </div>
    </div>
    <div th:insert="footer::footer"></div>
  </body>
</html>
