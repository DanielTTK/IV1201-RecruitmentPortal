<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>User Page</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body style="background-color: #1d254d; color: white">
    <div th:insert="header::header"></div>
    <h1 style="color: white">Handle applications</h1>
    <div style="text-align: left">
      <table>
        <thead>
          <tr>
            <th style="padding-right: 120px; padding-bottom: 20px;">Status</th>
            <th style="padding-right: 140px; padding-bottom: 20px;">Created</th>
            <th style="padding-right: 120px; padding-bottom: 20px; text-align: center"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(applications)}">
            <td colspan="3">No applications yet</td>
          </tr>

          <tr th:each="app : ${applications}">
            <td style="padding-bottom: 20px;">
              <span th:text="${app.status}">DRAFT</span>
            </td>
            <td style="padding-bottom: 20px; vertical-align: top;"
              th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">
              2026-03-02 14:54
            </td>
            <td >
              <form
                th:action="@{/application/withdraw}"
                method="post"
                style="display: inline"
                th:if="${!#lists.isEmpty(applications)}">
                <input
                  type="hidden"
                  name="applicationId"
                  th:value="${app.applicationId}" />
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}" />
                <!-- <button type="submit">Review</button> -->
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div th:insert="footer::footer"></div>
  </body>
</html>
