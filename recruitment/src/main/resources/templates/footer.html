<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <!doctype html>
  <html>
    <head> </head>
    <body>
      <div class="footer" th:fragment="footer">
        <div class="row" style="margin-bottom: 0">
          <p style="margin-left: 0">&copy; Amusement parks 2026</p>
          <div style="margin-top: 15px;" sec:authorize="isAnonymous()">
            <p style="font-size: small; margin-right: 0; display: inline; justify-content: center;">
              Admin? Log in here:
            </p>
            <a
              href="loginAdmin"
              style="
                text-decoration: none;
                color: black;
                font-size: small;
                display: inline;
              "
              >Login</a
            >
          </div>
        </div>
      </div>
    </body>
  </html>
</html>
