<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>User Page</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div th:insert="header :: header"></div>

    <h1>Welcome <span th:text="${name ?: 'User'}">User</span></h1>

    <div style="text-align: left">
      <h3>Submit a new application</h3>
      <div style="margin-top: 20px; padding-top: 20px; padding-bottom: 50px">
        <a href="/competenceProfile"
           style="padding: 20px 40px; border: 2px solid black; text-decoration: none; color: black; border-radius: 4px;">
          +
        </a>
      </div>

    <h3>My applications</h3>

    <table >
      <thead>
        <tr >
          <th style="padding-right: 120px;">Status</th>
          <th style="padding-right: 140px;">Created</th>
          <th style="padding-right: 120px; text-align:center">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(applications)}">
          <td colspan="3" style="padding-top: 20px; color: darkblue; font-weight:bold;">No applications yet, submit one by pressing "+"</td>
        </tr>

        <tr th:each="app : ${applications}">
          <td>
            <span th:text="${app.status}">DRAFT</span>
          </td>
          <td th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-02 14:54</td>
          <td>
            <a th:if="${app.status.name() == 'DRAFT'}"
              href="/competenceProfile"
              style="display:inline-block; padding: 6px 10px; border: 1px solid #000; border-radius: 4px; text-decoration:none; color:inherit;">
              Continue
            </a>

            <form th:action="@{/application/withdraw}"
                  method="post"
                  style="display:inline;"
                  th:if="${!#lists.isEmpty(applications)}">

              <input type="hidden" name="applicationId" th:value="${app.applicationId}" style="padding: 50px;"/>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit" style="align-items: left;">Withdraw</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>

    <div th:insert="footer :: footer"></div>
  </body>
</html>
