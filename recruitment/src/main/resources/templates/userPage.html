<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>User Page</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div th:insert="header :: header"></div>

    <h1>Welcome <span th:text="${name ?: 'User'}">User</span></h1>

    <div style="text-align: left">
      <h3>Submit a new application</h3>
      <div style="margin-top: 20px; padding-top: 20px; padding-bottom: 50px">
        <a th:if="${#lists.isEmpty(applications)}"
          th:href="@{/competenceProfile}"
          style="padding: 20px 40px; border: 2px solid black; text-decoration: none; color: black; border-radius: 4px;">
          +
        </a>

        <span th:if="${!#lists.isEmpty(applications)}"
              style="display:inline-block; padding: 20px 0; color: #444;">
          You already have an application submitted.
        </span>
      </div>

    <h3>My applications</h3>

    <table >
      <thead>
        <tr >
          <th style="padding-right: 120px;">Status</th>
          <th style="padding-right: 140px;">Created</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(applications)}">
          <td colspan="3" style="padding-top: 20px; color: darkblue; font-weight:bold;">No applications yet, submit one by pressing "+"</td>
        </tr>

        <tr th:each="app : ${applications}">
          <td>
            <span th:text="${app.status}">UNHANDLED</span>
          </td>
          <td th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-02 14:54</td>
          <td>
            </a>
          </td>
        </tr>
      </tbody>
    </table>

    <div th:insert="footer :: footer"></div>
  </body>
</html>
